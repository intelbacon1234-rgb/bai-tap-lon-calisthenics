<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý | Trình Theo Dõi Thể Thao</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="
      background-image: url(&quot;https://pos.nvncdn.com/4e732c-26/art/gantt-chart.png&quot;);
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    "
  >
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="trangchu.html"
          >Calisthenics App</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="trangchu.html">Trang Chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="trangquanli.html"
                >Quản Lý Nhật Ký</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="debug.html">Trang Debug</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <h2 class="border-bottom pb-2 mb-4 text-primary">
        Trang Quản Lý Nhật Ký
      </h2>

      <div class="row">
        <div class="col-lg-4 mb-4">
          <div class="card shadow-sm p-3">
            <form id="workoutForm">
              <div class="mb-3">
                <label for="studentId" class="form-label fw-bold"
                  >Mã Số Sinh Viên (MSSV)</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="studentId"
                  placeholder="VD: 20215567"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="exercise" class="form-label fw-bold"
                  >Tên bài tập</label
                >
                <select class="form-select" id="exercise" required>
                  <option value="" selected disabled>-- Chọn bộ môn --</option>
                  <option value="Hít Xà Đơn (Pull-ups)">
                    Hít Xà Đơn (Pull-ups)
                  </option>
                  <option value="Đu Xà Kép (Dips)">Đu Xà Kép (Dips)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Thời gian tập</label>
                <div class="d-flex gap-2">
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="hours"
                      min="0"
                      placeholder="0"
                      required
                    />
                    <span class="input-group-text">Giờ</span>
                  </div>
                  <div class="input-group">
                    <input
                      type="number"
                      class="form-control"
                      id="minutes"
                      min="0"
                      max="59"
                      placeholder="0"
                      required
                    />
                    <span class="input-group-text">Phút</span>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label for="calories" class="form-label fw-bold"
                  >Lượng Calo tiêu thụ</label
                >
                <div class="input-group">
                  <input
                    type="number"
                    class="form-control"
                    id="calories"
                    min="1"
                    placeholder="VD: 350"
                    required
                  />
                  <span class="input-group-text">kcal</span>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Ghi Nhận Buổi Tập
              </button>
            </form>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="table-responsive">
            <table class="table table-striped table-bordered table-hover">
              <thead class="table-dark">
                <tr>
                  <th>MSSV</th>
                  <th>Bài Tập</th>
                  <th>Thời Gian</th>
                  <th>Calo (kcal)</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="alert alert-info mt-3">
            <strong>Quy tắc chèn:</strong> MSSV kết thúc bằng số
            <strong>lẻ</strong> chèn lên đầu bảng, số <strong>chẵn</strong> chèn
            xuống cuối bảng.
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
